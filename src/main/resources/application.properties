# ================= DATABASE CONFIG (DÙNG TÀI KHOẢN sa) =================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ASM_JAVA5;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=ThanhTrung
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# JSP View
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
google.vision.api.key=dummy